appId: com.agenticx.multi-agent
productName: Multi-Agent
directories:
  output: release
files:
  - dist/**/*
  - dist-electron/**/*
# M6 会在此追加 extraResources：PyInstaller 产物 + .env
extraMetadata:
  main: dist-electron/main.js
mac:
  target:
    - dmg
    - zip
win:
  target:
    - nsis
linux:
  target:
    - AppImage
    - deb
